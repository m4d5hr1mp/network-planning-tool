<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netowrk Preview</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>Filters</h2>
            <button id="toggle-sidebar">«</button>
        </div>
        <div id="tabs">
            <button class="tab-button active" data-tab="airline">By Airline</button>
            <button class="tab-button" data-tab="base">By Origin Base</button>
            <button class="tab-button" data-tab="airline-base">By Airline Base</button>
        </div>
        <div id="tab-content">
            <div id="airline-controls" class="tab-panel active">
                <h3>Filter by Airline</h3>
                <!-- Dynamically populated -->
            </div>
            <div id="base-controls" class="tab-panel">
                <h3>Filter by Origin Base</h3>
                <!-- Dynamically populated -->
            </div>
            <div id="airline-base-controls" class="tab-panel">
                <h3>Filter by Airline Base</h3>
                <!-- Dynamically populated -->
            </div>
            <div id="legend"></div>
        </div>
    </div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet.Geodesic Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.geodesic"></script>
    <!-- Turf.js used for rendering airport catchemnt areas -->
     <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
